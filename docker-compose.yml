services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "18081:8081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: redis_ascop
    ports:
      - "6380:6379"

  postgres:
    image: postgres:15-alpine
    container_name: postgres_ascop
    environment:
      POSTGRES_USER: ascop_admin
      POSTGRES_PASSWORD: ascop_password
      POSTGRES_DB: ascop_ledger
    ports:
      - "5433:5432"

  opa:
    image: openpolicyagent/opa:latest
    container_name: opa_ascop
    ports:
      - "8182:8181"
    command:
      - "run"
      - "--server"
      - "--addr"
      - ":8181"
      - "--log-level=debug"
      - "/policies"
    volumes:
      - ./policies:/policies
